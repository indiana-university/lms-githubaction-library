# Description
# -----------
# This workflow builds and releases the maven artifact
#
# Setup
# -----
# 1. Create the following secrets inside GitHub:
#    - LMS_GIT_CONFIG (Base64 encoded .gitconfig file)
# 2. (Optional) If you want to perform a full Maven release, create the following additional secrets:
#    - LMS_MAVEN_SETTINGS (Base64 encoded settings.xml file)
#    - LMS_MAVEN_SECURITY (Base64 encoded settings-security.xml file)
#    - LMS_GPG_PASSPHRASE (GPG passphrase)
#.   - LMS_GPG_PRIVATE_KEY (GPG private key to be imported)

name: Maven Release

on:
  workflow_call:
    inputs:
      java_version:
        description: 'Java version to use'
        required: true
        default: '25'
        type: string
      full_maven_release:
        description: 'Whether to perform a full Maven release'
        required: false
        default: false
        type: boolean
    secrets:
      LMS_GIT_CONFIG:
        description: 'Base64 encoded .gitconfig file for Git'
        required: true
      LMS_MAVEN_SETTINGS:
        description: 'Base64 encoded settings.xml file for Maven'
        required: false
      LMS_MAVEN_SECURITY:
        description: 'Base64 encoded settings-security.xml file for Maven'
        required: false
      LMS_GPG_PASSPHRASE:
        description: 'GPG passphrase'
        required: false
      LMS_GPG_PRIVATE_KEY:
        description: 'GPG private key to be imported'
        required: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup git and other necessary files
        run: |
          echo -n '${{ secrets.LMS_GIT_CONFIG }}' | base64 -d > ~/.gitconfig
      - name: Setup git and other necessary files for optional full release
        if: ${{ inputs.full_maven_release }}
        run: |
          mkdir ~/.m2
          echo -n '${{ secrets.LMS_MAVEN_SETTINGS }}' | base64 -d > ~/.m2/settings.xml
          echo -n '${{ secrets.LMS_MAVEN_SECURITY }}' | base64 -d > ~/.m2/settings-security.xml
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'
          cache: maven
          overwrite-settings: false
          gpg-private-key: ${{ secrets.LMS_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Release prepare/perform
        run: mvn clean release:prepare release:perform -B
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.LMS_GPG_PASSPHRASE }}
